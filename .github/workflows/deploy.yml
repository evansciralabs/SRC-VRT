name: Deploy VRT to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Explicitly opt into Node 24 ahead of the June 2nd forced migration
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build VRT Architecture
        run: npm run build
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
